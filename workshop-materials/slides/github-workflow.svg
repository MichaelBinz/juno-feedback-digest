<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6e40c9"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a7f37"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0969da"/>
    </marker>
    <linearGradient id="vscode-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2b2b"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
    <linearGradient id="gh-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f8fa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" rx="12" fill="#f0f0f3"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#24292f">GitHub Workflow — From Local Changes to Pull Request</text>

  <!-- ===== LEFT: VS Code Window ===== -->
  <g transform="translate(40, 70)" filter="url(#shadow)">
    <!-- Window chrome -->
    <rect width="460" height="340" rx="10" fill="url(#vscode-grad)"/>
    <!-- Title bar -->
    <rect width="460" height="32" rx="10" fill="#323233"/>
    <rect y="20" width="460" height="12" fill="#323233"/>
    <!-- Traffic lights -->
    <circle cx="18" cy="16" r="6" fill="#ff5f57"/>
    <circle cx="38" cy="16" r="6" fill="#febc2e"/>
    <circle cx="58" cy="16" r="6" fill="#28c840"/>
    <text x="230" y="21" text-anchor="middle" font-size="12" fill="#999">VS Code — juno-feedback-digest</text>

    <!-- Sidebar -->
    <rect x="0" y="32" width="110" height="308" fill="#252526" rx="0"/>
    <text x="12" y="56" font-size="10" fill="#cccccc" font-weight="600">EXPLORER</text>
    <text x="16" y="76" font-size="10" fill="#8b949e">📁 docs/</text>
    <text x="16" y="94" font-size="10" fill="#8b949e">📁 knowledge-base/</text>
    <text x="16" y="112" font-size="10" fill="#e8ab53">📄 prd-draft.md</text>
    <text x="16" y="130" font-size="10" fill="#8b949e">📁 workshop-materials/</text>

    <!-- Editor area -->
    <rect x="110" y="32" width="350" height="308" fill="#1e1e1e"/>
    <!-- Tab -->
    <rect x="110" y="32" width="120" height="28" fill="#1e1e1e"/>
    <rect x="110" y="32" width="120" height="2" fill="#0078d4"/>
    <text x="135" y="50" font-size="10" fill="#ffffff">prd-draft.md</text>

    <!-- Editor content with line numbers -->
    <text x="120" y="80" font-size="10" fill="#6e7681" font-family="monospace">1</text>
    <text x="140" y="80" font-size="10" fill="#79c0ff" font-family="monospace"># Product Requirements</text>
    <text x="120" y="98" font-size="10" fill="#6e7681" font-family="monospace">2</text>
    <text x="140" y="98" font-size="10" fill="#c9d1d9" font-family="monospace"></text>
    <text x="120" y="116" font-size="10" fill="#6e7681" font-family="monospace">3</text>
    <text x="140" y="116" font-size="10" fill="#c9d1d9" font-family="monospace">## Overview</text>

    <!-- Highlighted changed lines -->
    <rect x="110" y="122" width="350" height="18" fill="#2ea04333" rx="0"/>
    <text x="120" y="136" font-size="10" fill="#6e7681" font-family="monospace">4</text>
    <text x="128" y="136" font-size="10" fill="#3fb950" font-family="monospace">+</text>
    <text x="140" y="136" font-size="10" fill="#aff5b4" font-family="monospace">The Juno Feedback Digest...</text>

    <rect x="110" y="140" width="350" height="18" fill="#2ea04333" rx="0"/>
    <text x="120" y="154" font-size="10" fill="#6e7681" font-family="monospace">5</text>
    <text x="128" y="154" font-size="10" fill="#3fb950" font-family="monospace">+</text>
    <text x="140" y="154" font-size="10" fill="#aff5b4" font-family="monospace">collects developer feedback</text>

    <rect x="110" y="158" width="350" height="18" fill="#2ea04333" rx="0"/>
    <text x="120" y="172" font-size="10" fill="#6e7681" font-family="monospace">6</text>
    <text x="128" y="172" font-size="10" fill="#3fb950" font-family="monospace">+</text>
    <text x="140" y="172" font-size="10" fill="#aff5b4" font-family="monospace">and produces weekly digests.</text>

    <text x="120" y="194" font-size="10" fill="#6e7681" font-family="monospace">7</text>
    <text x="140" y="194" font-size="10" fill="#c9d1d9" font-family="monospace">## Goals</text>

    <!-- Terminal panel -->
    <rect x="110" y="230" width="350" height="110" fill="#181818"/>
    <rect x="110" y="230" width="350" height="20" fill="#252526"/>
    <text x="120" y="244" font-size="9" fill="#cccccc" font-weight="600">TERMINAL</text>
    <text x="120" y="266" font-size="10" fill="#6e7681" font-family="monospace">$</text>
    <text x="135" y="266" font-size="10" fill="#e8ab53" font-family="monospace">git add .</text>
    <text x="120" y="284" font-size="10" fill="#6e7681" font-family="monospace">$</text>
    <text x="135" y="284" font-size="10" fill="#e8ab53" font-family="monospace">git commit -m "Add PRD content"</text>
    <text x="120" y="302" font-size="10" fill="#6e7681" font-family="monospace">$</text>
    <text x="135" y="302" font-size="10" fill="#e8ab53" font-family="monospace">git push origin workshop/my-name</text>

    <!-- Label below VS Code -->
    <text x="230" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#24292f">Your Machine (Local)</text>
  </g>

  <!-- ===== RIGHT: GitHub File Viewer ===== -->
  <g transform="translate(600, 70)" filter="url(#shadow)">
    <!-- Browser window -->
    <rect width="460" height="340" rx="10" fill="url(#gh-grad)" stroke="#d0d7de" stroke-width="1"/>
    <!-- Browser chrome -->
    <rect width="460" height="36" rx="10" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
    <rect y="24" width="460" height="12" fill="#f6f8fa"/>
    <!-- Traffic lights -->
    <circle cx="18" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="38" cy="18" r="6" fill="#febc2e"/>
    <circle cx="58" cy="18" r="6" fill="#28c840"/>
    <!-- URL bar -->
    <rect x="80" y="8" width="340" height="20" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
    <text x="92" y="22" font-size="8.5" fill="#57606a">github.com/MichaelBinz/juno-feedback-digest/blob/main/docs/prd-draft.md</text>

    <!-- GitHub header -->
    <rect x="0" y="36" width="460" height="32" fill="#24292f"/>
    <text x="16" y="56" font-size="14" fill="#ffffff">⚙</text>
    <text x="36" y="56" font-size="11" fill="#ffffff" font-weight="600">MichaelBinz</text>
    <text x="120" y="56" font-size="11" fill="#8b949e">/</text>
    <text x="130" y="56" font-size="11" fill="#ffffff" font-weight="600">juno-feedback-digest</text>

    <!-- Breadcrumb / path bar -->
    <rect x="0" y="68" width="460" height="28" fill="#f6f8fa" stroke="#d0d7de" stroke-width="0.5"/>
    <text x="16" y="86" font-size="10" fill="#0969da">docs</text>
    <text x="38" y="86" font-size="10" fill="#57606a">/</text>
    <text x="46" y="86" font-size="10" fill="#24292f" font-weight="700">prd-draft.md</text>
    <!-- Branch badge -->
    <rect x="340" y="74" width="100" height="20" rx="10" fill="#ddf4ff" stroke="#54aeff" stroke-width="0.5"/>
    <text x="356" y="88" font-size="9" fill="#0969da" font-weight="600">🔀 main</text>

    <!-- "Same file" callout -->
    <rect x="120" y="100" width="220" height="24" rx="12" fill="#fff8c5" stroke="#d4a72c" stroke-width="1"/>
    <text x="135" y="116" font-size="10" fill="#7d6807" font-weight="700">⚡ Same file — not yet updated!</text>

    <!-- File viewer box -->
    <rect x="16" y="132" width="428" height="186" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
    <!-- File header bar -->
    <rect x="16" y="132" width="428" height="26" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="0.5"/>
    <rect x="16" y="146" width="428" height="12" fill="#f6f8fa"/>
    <text x="30" y="150" font-size="10" fill="#57606a">5 lines · 98 Bytes</text>
    <text x="370" y="150" font-size="9" fill="#0969da" font-weight="600">Raw  Blame</text>

    <!-- File content — SAME as VS Code but rendered on white -->
    <text x="30" y="176" font-size="10" fill="#8b949e" font-family="monospace">1</text>
    <text x="52" y="176" font-size="10" fill="#24292f" font-family="monospace" font-weight="700"># Product Requirements</text>

    <text x="30" y="194" font-size="10" fill="#8b949e" font-family="monospace">2</text>

    <text x="30" y="212" font-size="10" fill="#8b949e" font-family="monospace">3</text>
    <text x="52" y="212" font-size="10" fill="#24292f" font-family="monospace" font-weight="600">## Overview</text>

    <!-- These lines are NOT here yet — file is still the old version -->
    <rect x="16" y="218" width="428" height="54" fill="#f6f8fa" rx="0"/>
    <text x="30" y="232" font-size="10" fill="#8b949e" font-family="monospace">4</text>
    <text x="52" y="232" font-size="10" fill="#b1bac4" font-family="monospace" font-style="italic">  (empty — no content yet)</text>

    <text x="30" y="268" font-size="10" fill="#8b949e" font-family="monospace">5</text>
    <text x="52" y="268" font-size="10" fill="#24292f" font-family="monospace" font-weight="600">## Goals</text>

    <!-- Connector label highlighting the same content -->
    <rect x="16" y="302" width="428" height="16" rx="0"/>

    <!-- Label below GitHub -->
    <text x="230" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#24292f">GitHub (Remote)</text>
  </g>

  <!-- ===== FLOW ARROWS ===== -->

  <!-- Step 1: Edit locally -->
  <g transform="translate(40, 465)">
    <rect width="200" height="56" rx="28" fill="#0969da" filter="url(#shadow)"/>
    <text x="56" y="24" font-size="12" fill="#ffffff" font-weight="700">① Edit Files</text>
    <text x="30" y="42" font-size="10" fill="#cce5ff">Make changes in VS Code</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="250" y1="493" x2="290" y2="493" stroke="#6e40c9" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Stage + Commit -->
  <g transform="translate(300, 465)">
    <rect width="200" height="56" rx="28" fill="#8250df" filter="url(#shadow)"/>
    <text x="26" y="24" font-size="12" fill="#ffffff" font-weight="700">② Stage &amp; Commit</text>
    <text x="16" y="42" font-size="10" fill="#e2d5f7">git add . → git commit -m "…"</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="510" y1="493" x2="550" y2="493" stroke="#6e40c9" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Push -->
  <g transform="translate(560, 465)">
    <rect width="200" height="56" rx="28" fill="#6e40c9" filter="url(#shadow)"/>
    <text x="54" y="24" font-size="12" fill="#ffffff" font-weight="700">③ Push</text>
    <text x="20" y="42" font-size="10" fill="#e2d5f7">git push origin your-branch</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="770" y1="493" x2="810" y2="493" stroke="#6e40c9" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Open PR -->
  <g transform="translate(820, 465)">
    <rect width="240" height="56" rx="28" fill="#1a7f37" filter="url(#shadow)"/>
    <text x="34" y="24" font-size="12" fill="#ffffff" font-weight="700">④ Open Pull Request</text>
    <text x="30" y="42" font-size="10" fill="#aff5b4">On GitHub — request review</text>
  </g>

  <!-- Big curved arrow from VS Code to GitHub (push) -->
  <path d="M 500 300 C 540 240, 560 240, 600 300" fill="none" stroke="#6e40c9" stroke-width="3" stroke-dasharray="8 4" marker-end="url(#arrow)"/>
  <text x="545" y="248" text-anchor="middle" font-size="12" font-weight="700" fill="#6e40c9">git push</text>

  <!-- ===== PR EXPLAINER BOX ===== -->
  <g transform="translate(120, 555)" filter="url(#shadow)">
    <rect width="860" height="140" rx="12" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
    <rect width="860" height="36" rx="12" fill="#f6f8fa" stroke="#d0d7de" stroke-width="0.5"/>
    <rect y="24" width="860" height="12" fill="#f6f8fa"/>
    <text x="24" y="24" font-size="14" font-weight="700" fill="#24292f">💡 What is a Pull Request (PR)?</text>

    <text x="24" y="60" font-size="12" fill="#24292f">A <tspan font-weight="700">Pull Request</tspan> is a proposal to merge your changes from a <tspan font-weight="700" fill="#6e40c9">feature branch</tspan> into the <tspan font-weight="700" fill="#1a7f37">main branch</tspan>.</text>
    <text x="24" y="82" font-size="12" fill="#57606a">It lets teammates review your work, leave comments, and approve before anything goes into the shared codebase.</text>

    <!-- Visual branch diagram -->
    <!-- main branch line -->
    <line x1="40" y1="116" x2="440" y2="116" stroke="#1a7f37" stroke-width="3"/>
    <circle cx="40" cy="116" r="5" fill="#1a7f37"/>
    <circle cx="440" cy="116" r="5" fill="#1a7f37"/>
    <text x="42" y="134" font-size="10" fill="#1a7f37" font-weight="700">main</text>

    <!-- feature branch -->
    <line x1="120" y1="116" x2="180" y2="100" stroke="#6e40c9" stroke-width="3"/>
    <line x1="180" y1="100" x2="320" y2="100" stroke="#6e40c9" stroke-width="3"/>
    <circle cx="220" cy="100" r="4" fill="#6e40c9"/>
    <circle cx="270" cy="100" r="4" fill="#6e40c9"/>
    <circle cx="320" cy="100" r="5" fill="#6e40c9"/>
    <text x="195" y="94" font-size="9" fill="#6e40c9" font-weight="700">workshop/my-name</text>

    <!-- PR merge arrow -->
    <line x1="320" y1="100" x2="380" y2="116" stroke="#6e40c9" stroke-width="2" stroke-dasharray="5 3"/>
    <rect x="340" y="98" width="26" height="16" rx="4" fill="#1a7f37"/>
    <text x="345" y="110" font-size="8" fill="#ffffff" font-weight="700">PR</text>

    <!-- Key points on right -->
    <text x="490" y="104" font-size="11" fill="#24292f">✅  Others can <tspan font-weight="700">review</tspan> your changes</text>
    <text x="490" y="122" font-size="11" fill="#24292f">✅  <tspan font-weight="700">main</tspan> stays protected — no direct pushes</text>
    <text x="490" y="140" font-size="11" fill="#24292f">✅  Changes are <tspan font-weight="700">merged</tspan> only after approval</text>
  </g>
</svg>